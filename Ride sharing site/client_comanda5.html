<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Comanda actuală</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .order-box {
      background-color: #fff;
      padding: 25px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 340px;
    }

    .order-box h2 {
      color: #0d6efd;
      text-align: center;
      margin-bottom: 20px;
    }

    .info {
      margin-bottom: 10px;
      font-size: 14px;
    }

    .info strong {
      display: inline-block;
      width: 100px;
    }

    .rating {
      margin: 10px 0;
      font-size: 14px;
      color: #f59e0b;
    }

    .reviews {
      background-color: #f1f5f9;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .search-btn {
      background-color: #0d6efd;
      color: #fff;
    }

    .search-btn:hover {
      background-color: #0b5ed7;
    }

    .cancel-btn {
      background-color: #dc2626;
      color: #fff;
    }

    .cancel-btn:hover {
      background-color: #b91c1c;
    }

    .back-link {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
    }

    .back-link a {
      text-decoration: none;
      color: #0d6efd;
    }
  </style>
</head>
<body>

  <div class="order-box">
    <h2>Comanda ta</h2>

    <div class="info"><strong>Plecare:</strong> Str. Exemplu 1</div>
    <div class="info"><strong>Destinație:</strong> Bd. Libertății 45</div>
    <div class="info"><strong>Cost estimat:</strong> 25 RON</div>

    <div class="rating">⭐ 4.8 / 5 (Soferi disponibili)</div>

    <div class="reviews">
      <p>„Foarte amabil și punctual.”</p>
      <p>„Experiență excelentă, recomand!”</p>
    </div>

    <button class="search-btn" onclick="alert('Căutare șofer...')">Caută șofer</button>
    <button class="cancel-btn" onclick="alert('Comanda a fost anulată')">Anulează</button>

    <div class="back-link">
      <a href="comanda.html">← Înapoi</a>
    </div>
  </div>

</body>
</html>
