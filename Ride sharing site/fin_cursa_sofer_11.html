<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Evaluare client</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .finish-box {
      background-color: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 350px;
    }

    h2 {
      color: #0d6efd;
      text-align: center;
      margin-bottom: 15px;
    }

    .section {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
    }

    select, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      height: 60px;
    }

    .finish-btn {
      width: 100%;
      background-color: #0d6efd;
      color: #fff;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 10px;
    }

    .finish-btn:hover {
      background-color: #0b5ed7;
    }

    .back-link {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
    }

    .back-link a {
      text-decoration: none;
      color: #0d6efd;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="finish-box">
    <h2>Evaluare client</h2>

    <div class="section">
      <label for="client-name">Client:</label>
      <input type="text" id="client-name" placeholder="Ex: Popescu Andrei" required>
    </div>

    <div class="section">
      <label for="rating">Rating client:</label>
      <select id="rating" required>
        <option value="">Selectează...</option>
        <option value="5">⭐⭐⭐⭐⭐ - Excelent</option>
        <option value="4">⭐⭐⭐⭐ - Foarte bun</option>
        <option value="3">⭐⭐⭐ - Bun</option>
        <option value="2">⭐⭐ - Slab</option>
        <option value="1">⭐ - Foarte slab</option>
      </select>
    </div>

    <div class="section">
      <label for="review">Recenzie:</label>
      <textarea id="review" placeholder="Cum a fost clientul?"></textarea>
    </div>

    <button class="finish-btn" onclick="alert('Recenzia a fost trimisă. Mulțumim!')">Trimite recenzia</button>

    <div class="back-link">
      <a href="cursa_sofer.html">← Înapoi la cursă</a>
    </div>
  </div>

</body>
</html>
