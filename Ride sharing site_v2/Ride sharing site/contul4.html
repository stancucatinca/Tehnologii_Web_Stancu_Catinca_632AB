<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Contul meu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .account-box {
      background-color: #fff;
      padding: 25px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 340px;
      text-align: center;
    }

    .account-box h2 {
      color: #0d6efd;
      margin-bottom: 20px;
    }

    .account-box input, .account-box select {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .account-box button {
      width: 100%;
      background-color: #0d6efd;
      color: #fff;
      border: none;
      padding: 10px;
      font-size: 15px;
      border-radius: 4px;
      cursor: pointer;
    }

    .account-box button:hover {
      background-color: #0b5ed7;
    }

    .back-link {
      margin-top: 10px;
      display: inline-block;
      font-size: 13px;
    }

    .back-link a {
      text-decoration: none;
      color: #0d6efd;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="account-box">
    <h2>Contul meu</h2>
    <form>
      <input type="text" placeholder="Nume" required>
      <input type="text" placeholder="Prenume" required>
      <input type="email" placeholder="Email" required>
      <input type="tel" placeholder="Număr de telefon" required>
      <select required>
        <option value="">Selectează statusul</option>
        <option value="client">Client</option>
        <option value="sofer">Șofer</option>
      </select>
      <button type="submit">Salvează</button>
    </form>
    <div class="back-link">
      <a href="comanda.html">← Înapoi la comandă</a>
    </div>
  </div>

</body>
</html>
