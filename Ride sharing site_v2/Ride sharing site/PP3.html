<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Comandă mașină</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .order-box {
      background-color: #fff;
      padding: 25px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 320px;
      text-align: center;
    }

    .order-box h2 {
      color: #0d6efd;
      margin-bottom: 20px;
    }

    .order-box input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .order-box button {
      width: 100%;
      background-color: #0d6efd;
      color: #fff;
      border: none;
      padding: 10px;
      font-size: 15px;
      border-radius: 4px;
      cursor: pointer;
    }

    .order-box button:hover {
      background-color: #0b5ed7;
    }

    .back-link {
      margin-top: 10px;
      display: inline-block;
      font-size: 13px;
    }

    .back-link a {
      text-decoration: none;
      color: #0d6efd;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="order-box">
    <h2>Comandă o mașină</h2>
    <form action="contul-meu.html" method="get">
      <input type="text" placeholder="Punct de plecare" required>
      <input type="text" placeholder="Adresa destinație" required>
      <button type="submit">Continuă</button>
    </form>
    <div class="back-link">
      <a href="index.html">← Înapoi la pagina principală</a>
    </div>
  </div>

</body>
</html>
