<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Log In</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background-color: #fff;
      padding: 30px 25px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 300px;
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #0d6efd;
    }

    .login-box input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .login-box button {
      width: 100%;
      background-color: #0d6efd;
      color: #fff;
      border: none;
      padding: 10px;
      font-size: 15px;
      border-radius: 4px;
      cursor: pointer;
    }

    .login-box button:hover {
      background-color: #0b5ed7;
    }

    .login-box p {
      margin-top: 15px;
      font-size: 13px;
    }

    .login-box a {
      color: #0d6efd;
      text-decoration: none;
    }

    .login-box a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2><a href="index.html" style="color:#0d6efd; text-decoration:none;">← RuSh</a></h2>
    <form>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Parolă" required>
      <button type="submit">Autentificare</button>
    </form>
    <p>Nu ai cont? <a href="signup.html">Înregistrează-te</a></p>
  </div>

</body>
</html>
