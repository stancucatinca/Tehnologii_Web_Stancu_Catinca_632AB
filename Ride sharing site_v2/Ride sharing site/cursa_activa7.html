<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Cursă activă</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .active-trip-box {
      background-color: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 350px;
    }

    h2 {
      color: #0d6efd;
      text-align: center;
      margin-bottom: 15px;
    }

    .map {
      width: 100%;
      height: 180px;
      background: url('https://maps.gstatic.com/tactile/basepage/pegman_sherlock.png') center/cover no-repeat;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .info {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .info strong {
      display: inline-block;
      width: 130px;
    }
  </style>
</head>
<body>

  <div class="active-trip-box">
    <h2>Cursa activă</h2>
    <div class="map"></div>
    <div class="info"><strong>Plecare:</strong> Str. Exemplu 1</div>
    <div class="info"><strong>Destinație:</strong> Bd. Libertății 45</div>
    <div class="info"><strong>Timp estimat:</strong> 15 minute</div>
    <div class="info"><strong>Cost total:</strong> 25 RON</div>
  </div>

</body>
</html>
