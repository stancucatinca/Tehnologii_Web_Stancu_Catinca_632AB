<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Final cursă</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .finish-box {
      background-color: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 350px;
    }

    h2 {
      color: #0d6efd;
      text-align: center;
      margin-bottom: 15px;
    }

    .section {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
    }

    select, textarea, input[type="radio"] {
      font-size: 14px;
    }

    select, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    textarea {
      resize: vertical;
      height: 60px;
    }

    .duration {
      font-size: 14px;
      background-color: #f1f5f9;
      padding: 8px;
      border-radius: 4px;
    }

    .payment-options {
      display: flex;
      justify-content: space-around;
      margin-top: 5px;
    }

    .payment-options label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
    }

    .finish-btn {
      width: 100%;
      background-color: #0d6efd;
      color: #fff;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 10px;
    }

    .finish-btn:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>
<body>

  <div class="finish-box">
    <h2>Final cursă</h2>

    <div class="section">
      <label for="rating">Rating cursă:</label>
      <select id="rating">
        <option value="">Selectează...</option>
        <option value="5">⭐⭐⭐⭐⭐ - Excelent</option>
        <option value="4">⭐⭐⭐⭐ - Foarte bun</option>
        <option value="3">⭐⭐⭐ - Bun</option>
        <option value="2">⭐⭐ - Slab</option>
        <option value="1">⭐ - Foarte slab</option>
      </select>
    </div>

    <div class="section">
      <label for="review">Scrie un review:</label>
      <textarea id="review" placeholder="Cum a fost cursa?"></textarea>
    </div>

    <div class="section">
      <label>Durata cursei:</label>
      <div class="duration">15 minute</div>
    </div>

    <div class="section">
      <label>Metodă de plată:</label>
      <div class="payment-options">
        <label><input type="radio" name="plata" value="cash"> Cash</label>
        <label><input type="radio" name="plata" value="card"> Card</label>
      </div>
    </div>

    <button class="finish-btn" onclick="alert('Mulțumim! Cursa a fost finalizată.')">Finalizează cursa</button>
  </div>

</body>
</html>
