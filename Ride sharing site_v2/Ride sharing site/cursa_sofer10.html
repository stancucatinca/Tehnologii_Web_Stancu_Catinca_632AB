<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Cursă șofer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8fafc;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .driver-trip-box {
      background-color: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 350px;
    }

    h2 {
      color: #0d6efd;
      text-align: center;
      margin-bottom: 15px;
    }

    .map {
      width: 100%;
      height: 180px;
      background: url('https://maps.gstatic.com/tactile/basepage/pegman_sherlock.png') center/cover no-repeat;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .info {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .info strong {
      display: inline-block;
      width: 100px;
    }

    .button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background-color: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .button:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>
<body>

  <div class="driver-trip-box">
    <h2>Cursa în desfășurare</h2>
    <div class="map"></div>
    <div class="info"><strong>Plecare:</strong> Str. Exemplu 1</div>
    <div class="info"><strong>Destinație:</strong> Bd. Libertății 45</div>
    <div class="info"><strong>Cost:</strong> 25 RON</div>

    <button class="button" onclick="alert('Clienți apropiați: Popescu M. (drum asemănător), Ionescu A. (1 km)')">
      Caută clienți apropiați
    </button>
  </div>

</body>
</html>
