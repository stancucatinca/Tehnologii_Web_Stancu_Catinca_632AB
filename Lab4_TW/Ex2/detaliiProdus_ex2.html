<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercițiu 2 - Detalii Produs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Detalii produs</h1>

    <div class="card-produs">
        
        <img src="telefon_barbie.jpg" alt="Imagine Telefon" class="img-produs">
        
        <h2>Telefon Barbie Premium</h2>
        
        <button id="btnDetalii">Afișează detalii</button>

        <div id="detalii">
            <p class="descriere">
                Acesta este un telefon de ultimă generație Barbie, echipat cu un procesor ultra-rapid, 
                cameră de 108MP și o baterie care durează 5 zile. Design premium roz, cu butoane din sticlă și metal.
            </p>
            <p class="nota-data">
                Informațiile sunt valabile la data: <span id="dataProdus"></span>.
            </p>
        </div>
    </div>

    <script src="script_ex2.js"></script>
</body>
</html>
