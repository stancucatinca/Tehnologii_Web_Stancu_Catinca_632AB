<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Mea de Activități</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="card card-activitati">
            <h1 class="card-title">Lista mea de activități</h1>
            <p class="card-description">To do notes and reminder.</p>

            <div class="input-group">
                <input type="text" id="inputActivitate" placeholder="Adaugă o activitate nouă..." aria-label="Introdu o activitate">
                <button id="btnAdauga" class="btn-primary">Adaugă</button>
            </div>

            <ul id="listaActivitati" class="activity-list">
                </ul>
        </div>
    </div>

    <script src="script_ex1.js"></script>
</body>
</html>
