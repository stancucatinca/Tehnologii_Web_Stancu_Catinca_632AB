<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Final cursă</title>

  <style>
  :root {
    --bg: linear-gradient(180deg, #f5f9fc 0%, #e9eff8 100%);
    --white: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --line: #cbd5e1;
    --primary: #0d6efd;
    --primary-hover: #0b5ed7;
    --accent: #f1f5f9;
    --success: #16a34a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 2rem;
  }

  .finish-box {
    background-color: var(--white);
    padding: 2.2rem;
    border: 1px solid var(--line);
    border-radius: 1rem;
    width: 440px;
    max-width: 95%;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    transition: all 0.3s ease;
  }

  .finish-box h2 {
    color: var(--primary);
    text-align: center;
    font-size: 1.7rem;
    margin-bottom: 1.5rem;
  }

  .section {
    margin-bottom: 1.3rem;
  }

  label {
    font-weight: 500;
    font-size: 0.95rem;
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  select,
  textarea {
    width: 100%;
    padding: 0.7rem 0.8rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--accent);
    font-family: inherit;
    color: var(--text);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .duration {
    font-size: 1rem;
    background-color: var(--accent);
    padding: 0.7rem 0.8rem;
    border-radius: 8px;
  }

  .payment-options {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-top: 0.4rem;
  }

  .payment-options label {
    display: flex;
    align-items: center;
    background: var(--accent);
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    gap: 0.5rem;
    font-size: 0.95rem;
    color: var(--muted);
    transition: background 0.2s ease;
  }

  .payment-options input[type="radio"] {
    accent-color: var(--primary);
  }

  .finish-btn {
    width: 100%;
    background-color: var(--primary);
    color: #fff;
    padding: 0.8rem;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    cursor: pointer;
    margin-top: 1rem;
    transition: background 0.2s ease;
  }

  .finish-btn:hover {
    background-color: var(--primary-hover);
  }

  .next-links {
    text-align: center;
    margin-top: 1rem;
  }

  .next-links a {
    color: var(--primary);
    text-decoration: none;
    font-size: 0.95rem;
  }
  .next-links a:hover { text-decoration: underline; }

  /* ---------- Buton "Mergi sus" ---------- */
  #top-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 12px 20px;
    font-size: 1rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s ease;
    z-index: 99;
  }

  #top-btn:hover {
    background: var(--primary-hover);
    transform: scale(1.05);
  }

  /* ---------- RESPONSIVITATE ---------- */
  @media (max-width: 600px) {
    html { font-size: 15px; }

    .finish-box {
      padding: 1.5rem;
    }

    .finish-box h2 {
      font-size: 1.4rem;
    }
  }
  </style>
</head>

<body>
  <a id="top"></a>

  <div class="finish-box">
    <h2>Final cursă</h2>

    <div class="section">
      <label for="rating">Rating cursă:</label>
      <select id="rating">
        <option value="">Selectează...</option>
        <option value="5">⭐⭐⭐⭐⭐ - Excelent</option>
        <option value="4">⭐⭐⭐⭐ - Foarte bun</option>
        <option value="3">⭐⭐⭐ - Bun</option>
        <option value="2">⭐⭐ - Slab</option>
        <option value="1">⭐ - Foarte slab</option>
      </select>
    </div>

    <div class="section">
      <label for="review">Scrie un review:</label>
      <textarea id="review" placeholder="Cum a fost cursa?"></textarea>
    </div>

    <div class="section">
      <label>Durata cursei:</label>
      <div class="duration">15 minute</div>
    </div>

    <div class="section">
      <label>Metodă de plată:</label>
      <div class="payment-options">
        <label><input type="radio" name="plata" value="cash"> Cash</label>
        <label><input type="radio" name="plata" value="card"> Card</label>
      </div>
    </div>

    <button class="finish-btn" onclick="finalizare()">Finalizează cursa</button>

    <div class="next-links">
      <a href="index.html">← Înapoi la acasă</a> |
      
    </div>
  </div>

  <a href="#top" id="top-btn">⬆ Mergi sus</a>

  <script>
    function finalizare() {
      const rating = document.getElementById('rating').value;
      if (!rating) {
        alert('Te rugăm să selectezi un rating pentru cursă.');
        return;
      }
      alert('✅ Mulțumim pentru feedback! Cursa a fost finalizată cu succes.');
    }

    const topBtn = document.getElementById("top-btn");
    window.addEventListener("scroll", () => {
      topBtn.style.display = document.documentElement.scrollTop > 200 ? "block" : "none";
    });
  </script>
</body>
</html>
