<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuSh - Evaluare client</title>

  <style>
  :root {
    --bg: #eef3f8;
    --white: rgba(255, 255, 255, 0.95);
    --text: #1e293b;
    --muted: #475569;
    --line: #d1d5db;
    --primary: #0d6efd;
    --primary-hover: #0b5ed7;
    --accent: #f8fafc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }

  /* ---------- CONTAINER ---------- */
  .finish-container {
    display: flex;
    align-items: stretch;
    justify-content: center;
    background: var(--white);
    border-radius: 1rem;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    overflow: hidden;
    max-width: 950px;
    width: 100%;
  }

  /* ---------- IMAGINE ---------- */
  .finish-image {
    width: 45%;
    background-image: url(Images/Cat.jpg);
    background-size: cover;
    background-position: center;
    filter: brightness(0.95);
  }

  /* ---------- FORMULAR ---------- */
  .finish-box {
    flex: 1;
    padding: 3rem 2rem;
    text-align: center;
    background: var(--accent);
  }

  .finish-box h2 {
    color: var(--primary);
    font-size: 2rem;
    margin-bottom: 1.5rem;
  }

  .finish-box .section {
    margin-bottom: 1.2rem;
    text-align: left;
  }

  .finish-box label {
    display: block;
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
    color: var(--muted);
  }

  .finish-box input,
  .finish-box select,
  .finish-box textarea {
    width: 100%;
    padding: 0.8rem;
    border: 1px solid #ccc;
    border-radius: 0.5rem;
    font-size: 1rem;
    font-family: inherit;
    transition: box-shadow 0.2s;
    background: #fff;
  }

  .finish-box input:focus,
  .finish-box select:focus,
  .finish-box textarea:focus {
    outline: none;
    box-shadow: 0 0 6px rgba(13,110,253,0.4);
  }

  .finish-box textarea {
    resize: vertical;
    height: 90px;
  }

  .finish-box .finish-btn {
    width: 100%;
    background-color: var(--primary);
    color: #fff;
    padding: 0.9rem;
    border: none;
    border-radius: 0.5rem;
    cursor: pointer;
    font-size: 1.1rem;
    margin-top: 1rem;
    transition: background 0.2s, transform 0.15s;
  }

  .finish-box .finish-btn:hover {
    background-color: var(--primary-hover);
    transform: scale(1.03);
  }

  .back-link {
    margin-top: 1.2rem;
    font-size: 0.9rem;
  }

  .back-link a {
    color: var(--primary);
    text-decoration: none;
  }

  .back-link a:hover { text-decoration: underline; }

  /* ---------- Buton "Mergi sus" ---------- */
  #top-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 1rem;
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
    z-index: 99;
    transition: all 0.3s ease;
    display: none;
  }

  #top-btn:hover {
    background: var(--primary-hover);
    transform: scale(1.05);
  }

  /* ---------- RESPONSIVITATE ---------- */
  @media (max-width: 899px) {
    html { font-size: 15px; }

    .finish-container {
      flex-direction: column;
      max-width: 420px;
    }

    .finish-image { display: none; }

    .finish-box {
      padding: 2rem 1.5rem;
    }

    .finish-box h2 { font-size: 1.6rem; }
  }
  </style>
</head>

<body>
  <a id="top"></a>

  <div class="finish-container">
    <!-- IMAGINE STÂNGA -->
    <div class="finish-image"></div>

    <!-- FORMULAR -->
    <div class="finish-box">
      <h2>Evaluare client</h2>

      <div class="section">
        <label for="client-name">Client:</label>
        <input type="text" id="client-name" placeholder="Ex: Popescu Andrei" required>
      </div>

      <div class="section">
        <label for="rating">Rating client:</label>
        <select id="rating" required>
          <option value="">Selectează...</option>
          <option value="5">⭐⭐⭐⭐⭐ - Excelent</option>
          <option value="4">⭐⭐⭐⭐ - Foarte bun</option>
          <option value="3">⭐⭐⭐ - Bun</option>
          <option value="2">⭐⭐ - Slab</option>
          <option value="1">⭐ - Foarte slab</option>
        </select>
      </div>

      <div class="section">
        <label for="review">Recenzie:</label>
        <textarea id="review" placeholder="Cum a fost clientul?"></textarea>
      </div>

      <a href="index.html">
        <button class="finish-btn" onclick="alert('Recenzia a fost trimisă. Mulțumim!')">Trimite recenzia</button>
      </a>

      <div class="back-link">
        <a href="cursa_sofer10.html">← Înapoi la cursă</a>
      </div>
    </div>
  </div>

  <button id="top-btn" aria-label="Mergi sus">Up</button>

  <script>
    const topBtn = document.getElementById("top-btn");
    window.addEventListener("scroll", () => {
      topBtn.style.display = document.documentElement.scrollTop > 200 ? "block" : "none";
    });
  </script>
</body>
</html>
